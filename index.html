<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Object Detector</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.17.0"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
      background:#0a0a0a; color:#fff; font-family:system-ui,sans-serif;
      display:flex; flex-direction:column; align-items:center; 
      min-height:100vh; padding-bottom:20px;
    }
    h1 { 
      padding:16px 12px; font-size:1.1rem; color:#4ade80; 
      letter-spacing:0.5px; font-weight:600;
    }
    #container { 
      position:relative; width:100%; max-width:640px; 
      background:#1a1a1a; border:1px solid #333; border-radius:8px;
      overflow:hidden;
    }
    video, canvas { width:100%; display:block; }
    canvas { position:absolute; top:0; left:0; }
    #status { 
      padding:12px; font-size:0.85rem; color:#888; text-align:center; 
      background:#111; border-top:1px solid #222;
    }
    #fps { 
      position:absolute; top:8px; right:8px; background:rgba(0,0,0,0.7);
      padding:4px 8px; border-radius:4px; font-size:0.75rem; 
      color:#4ade80; border:1px solid #4ade80;
    }
    #stats { 
      padding:12px; font-size:0.8rem; color:#aaa; text-align:center;
      max-height:80px; overflow-y:auto;
    }
    .control-panel {
      padding:12px; background:#111; border-radius:4px; margin-top:12px;
      width:100%; max-width:640px;
    }
    .slider-group {
      display:flex; align-items:center; gap:8px; margin-bottom:8px; font-size:0.85rem;
    }
    input[type="range"] {
      flex:1; cursor:pointer;
    }
    #confValue, #iouValue {
      min-width:40px; text-align:right; color:#4ade80;
    }
    .info { padding:8px 12px; font-size:0.75rem; color:#666; text-align:center; }
  </style>
</head>
<body>
  <h1>Object Detector (COCO YOLOv8n)</h1>
  <div id="container">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
    <div id="fps">-- FPS</div>
  </div>
  <div id="status">Loading model...</div>
  <div id="stats"></div>
  
  <div class="control-panel">
    <div class="slider-group">
      <label>Confidence:</label>
      <input type="range" id="confSlider" min="10" max="95" value="35">
      <span id="confValue">0.35</span>
    </div>
    <div class="slider-group">
      <label>IoU (NMS):</label>
      <input type="range" id="iouSlider" min="20" max="95" value="45">
      <span id="iouValue">0.45</span>
    </div>
  </div>
  
  <div class="info">
    📱 Open camera • Allows 80 COCO classes (person, car, dog, etc.)
  </div>

<script>
const MODEL_PATH   = './model/tfjs_model/model.json';
const CLASSES_PATH = './model/classes.json';
const INPUT_SIZE   = 640;

let CONF_THRESH = 0.35;
let IOU_THRESH  = 0.45;

const classColors = {};
function colorFor(id) {
  if (!classColors[id]) {
    const h = (id * 137) % 360;
    const s = 70 + (id % 3) * 10;
    const l = 50 + (id % 2) * 5;
    classColors[id] = `hsl(${h},${s}%,${l}%)`;
  }
  return classColors[id];
}

let model, classNames, lastTime = performance.now(), frameCount = 0;
const video   = document.getElementById('video');
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const fpsEl   = document.getElementById('fps');
const statsEl  = document.getElementById('stats');
const confSlider = document.getElementById('confSlider');
const iouSlider  = document.getElementById('iouSlider');
const confValue  = document.getElementById('confValue');
const iouValue   = document.getElementById('iouValue');

confSlider.addEventListener('change', (e) => {
  CONF_THRESH = e.target.value / 100;
  confValue.textContent = CONF_THRESH.toFixed(2);
});

iouSlider.addEventListener('change', (e) => {
  IOU_THRESH = e.target.value / 100;
  iouValue.textContent = IOU_THRESH.toFixed(2);
});

async function init() {
  try {
    await tf.setBackend('webgl');
    await tf.ready();
    statusEl.textContent = 'Loading class names...';
    classNames = await fetch(CLASSES_PATH).then(r => r.json());
    statusEl.textContent = `Loading model (${classNames.length} classes)...`;
    model = await tf.loadGraphModel(MODEL_PATH);
    statusEl.textContent = 'Starting camera...';
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { 
        facingMode: 'environment', 
        width: { ideal: 640 }, 
        height: { ideal: 480 } 
      }
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      statusEl.textContent = '🟢 Detecting...';
      detectLoop();
    };
  } catch (err) {
    statusEl.textContent = '❌ ' + err.message;
    console.error(err);
  }
}

function preprocess(v) {
  return tf.tidy(() =>
    tf.browser.fromPixels(v)
      .resizeBilinear([INPUT_SIZE, INPUT_SIZE])
      .div(255.0)
      .expandDims(0)
  );
}

function decodeYOLOv8(output, imgW, imgH) {
  const data = output.dataSync();
  const nc = classNames.length;
  const A = 8400;
  const dets = [];
  
  for (let i = 0; i < A; i++) {
    const cx = data[0*A + i];
    const cy = data[1*A + i];
    const w  = data[2*A + i];
    const h  = data[3*A + i];
    
    let maxConf = 0, classId = 0;
    for (let c = 0; c < nc; c++) {
      const conf = data[(4 + c)*A + i];
      if (conf > maxConf) {
        maxConf = conf;
        classId = c;
      }
    }
    
    if (maxConf < CONF_THRESH) continue;
    
    const x1 = (cx - w/2) / INPUT_SIZE * imgW;
    const y1 = (cy - h/2) / INPUT_SIZE * imgH;
    const x2 = (cx + w/2) / INPUT_SIZE * imgW;
    const y2 = (cy + h/2) / INPUT_SIZE * imgH;
    
    dets.push({ x1, y1, x2, y2, conf: maxConf, classId });
  }
  
  return nms(dets);
}

function iou(a, b) {
  const ix1 = Math.max(a.x1, b.x1);
  const iy1 = Math.max(a.y1, b.y1);
  const ix2 = Math.min(a.x2, b.x2);
  const iy2 = Math.min(a.y2, b.y2);
  
  const inter = Math.max(0, ix2 - ix1) * Math.max(0, iy2 - iy1);
  const aArea = (a.x2 - a.x1) * (a.y2 - a.y1);
  const bArea = (b.x2 - b.x1) * (b.y2 - b.y1);
  const union = aArea + bArea - inter;
  
  return inter / union;
}

function nms(dets) {
  dets.sort((a, b) => b.conf - a.conf);
  const keep = [];
  const suppressed = new Set();
  
  for (let i = 0; i < dets.length; i++) {
    if (suppressed.has(i)) continue;
    keep.push(dets[i]);
    
    for (let j = i + 1; j < dets.length; j++) {
      if (dets[i].classId === dets[j].classId && 
          iou(dets[i], dets[j]) > IOU_THRESH) {
        suppressed.add(j);
      }
    }
  }
  
  return keep;
}

function drawBoxes(dets) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const detected = {};
  
  for (const d of dets) {
    const label = classNames[d.classId] || `class_${d.classId}`;
    const color = colorFor(d.classId);
    
    // Draw bounding box
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.strokeRect(d.x1, d.y1, d.x2 - d.x1, d.y2 - d.y1);
    
    // Draw label background
    const text = `${label} ${(d.conf * 100).toFixed(0)}%`;
    ctx.font = 'bold 12px system-ui';
    const metrics = ctx.measureText(text);
    const tw = metrics.width + 10;
    
    ctx.fillStyle = color;
    ctx.fillRect(d.x1, d.y1 - 22, tw, 22);
    
    // Draw label text
    ctx.fillStyle = '#000';
    ctx.fillText(text, d.x1 + 5, d.y1 - 7);
    
    // Count detections per class
    detected[label] = (detected[label] || 0) + 1;
  }
  
  // Update stats
  if (dets.length > 0) {
    const lines = Object.entries(detected)
      .sort((a, b) => b[1] - a[1])
      .map(([cls, cnt]) => `${cls}(${cnt})`)
      .join(' • ');
    statsEl.textContent = lines;
  } else {
    statsEl.textContent = '';
  }
}

async function detectLoop() {
  if (video.readyState === 4) {
    const input = preprocess(video);
    const output = await model.executeAsync(input);
    const outTensor = Array.isArray(output) ? output[0] : output;
    
    const dets = decodeYOLOv8(outTensor, canvas.width, canvas.height);
    drawBoxes(dets);
    
    tf.dispose([input, ...(Array.isArray(output) ? output : [output])]);
    
    frameCount++;
    const now = performance.now();
    if (now - lastTime > 1000) {
      fpsEl.textContent = `${frameCount} FPS`;
      frameCount = 0;
      lastTime = now;
    }
  }
  requestAnimationFrame(detectLoop);
}

init();
</script>
</body>
</html>
