<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Object Detector</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0d0d0d;color:#e8e8e8;font:14px/1.5 system-ui,sans-serif;display:flex;flex-direction:column;align-items:center}
#wrap{position:relative;width:100%;max-width:640px}
video{width:100%;display:block;background:#111}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#hud{position:absolute;top:6px;left:6px;display:flex;gap:6px;align-items:center}
#fps{background:rgba(0,0,0,.65);border:1px solid #4ade80;color:#4ade80;padding:2px 7px;border-radius:4px;font-size:12px}
#res-badge{background:rgba(0,0,0,.65);border:1px solid #555;color:#aaa;padding:2px 7px;border-radius:4px;font-size:12px}
#bar{background:#111;border-top:1px solid #1e1e1e;padding:8px 10px;width:100%;max-width:640px}
#status{font-size:12px;color:#888;text-align:center;padding:4px 0 6px}
.row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;color:#999}
.row label{min-width:72px}
input[type=range]{flex:1;accent-color:#4ade80;cursor:pointer}
.val{min-width:32px;text-align:right;color:#4ade80;font-size:12px}
#det-list{font-size:11px;color:#777;padding:2px 0;min-height:16px;text-align:center}
</style>
</head>
<body>
<div id="wrap">
  <video id="v" autoplay muted playsinline></video>
  <canvas id="c"></canvas>
  <div id="hud">
    <div id="fps">-- fps</div>
    <div id="res-badge">320</div>
  </div>
</div>
<div id="bar">
  <div id="status">Loading model...</div>
  <div class="row"><label>Confidence</label><input type="range" id="sl-conf" min="10" max="90" value="35"><span class="val" id="vconf">0.35</span></div>
  <div class="row"><label>Resolution</label><input type="range" id="sl-res" min="0" max="2" value="0" step="1"><span class="val" id="vres">320</span></div>
  <div id="det-list"></div>
</div>

<script>
const MODEL = './model/tfjs_model/model.json';
const LABELS = './model/classes.json';
const SIZES = [320, 416, 640];
const IOU = 0.45;

let model, labels, inputSz = 320, confThresh = 0.35;
let running = false, rafId = null;
let lastFpsTime = performance.now(), framesSinceLastFps = 0;

const vid   = document.getElementById('v');
const can   = document.getElementById('c');
const ctx   = can.getContext('2d');
const stEl  = document.getElementById('status');
const fpsEl = document.getElementById('fps');
const resEl = document.getElementById('res-badge');
const detEl = document.getElementById('det-list');

// ── Persistent offscreen canvas avoids repeated allocation ──
const offscreen = document.createElement('canvas');
const offCtx    = offscreen.getContext('2d');

// ── Label colours (stable per class id) ──
const palette = [];
function classColor(id) {
  if (!palette[id]) {
    const h = (id * 137) % 360;
    palette[id] = `hsl(${h},75%,55%)`;
  }
  return palette[id];
}

// ── Controls ──
document.getElementById('sl-conf').addEventListener('input', e => {
  confThresh = e.target.value / 100;
  document.getElementById('vconf').textContent = confThresh.toFixed(2);
});

document.getElementById('sl-res').addEventListener('input', e => {
  inputSz = SIZES[+e.target.value];
  document.getElementById('vres').textContent = inputSz;
  resEl.textContent = inputSz;
  offscreen.width  = inputSz;
  offscreen.height = inputSz;
});

// ── Init ──
async function init() {
  try {
    // Prefer WebGL, fall back to WASM, then CPU — important for low-end devices
    for (const backend of ['webgl', 'wasm', 'cpu']) {
      try {
        await tf.setBackend(backend);
        await tf.ready();
        stEl.textContent = `Backend: ${tf.getBackend()} — loading labels...`;
        break;
      } catch(_) {}
    }

    labels = await fetch(LABELS).then(r => r.json());
    stEl.textContent = `Loading model (${labels.length} classes)...`;
    model = await tf.loadGraphModel(MODEL);

    // Warm-up pass so first real frame isn't slow
    const dummy = tf.zeros([1, inputSz, inputSz, 3]);
    const warmup = await model.executeAsync(dummy);
    tf.dispose([dummy, ...(Array.isArray(warmup) ? warmup : [warmup])]);

    stEl.textContent = 'Starting camera...';
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'environment', width:{ideal:640}, height:{ideal:480} }
    });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => {
      can.width  = vid.videoWidth;
      can.height = vid.videoHeight;
      offscreen.width  = inputSz;
      offscreen.height = inputSz;
      stEl.textContent = 'Detecting...';
      loop();
    };
  } catch(err) {
    stEl.textContent = 'Error: ' + err.message;
    console.error(err);
  }
}

// ── Detection loop with guard ──
function loop() {
  rafId = requestAnimationFrame(async () => {
    if (running) { loop(); return; }  // skip frame if previous isn't done
    running = true;
    try {
      if (vid.readyState >= 2) {
        const dets = await detect();
        draw(dets);
        updateFps();
      }
    } catch(err) {
      console.error('Detection error:', err);
    } finally {
      running = false;
      loop();
    }
  });
}

// ── Preprocess via offscreen canvas (reuses allocation) ──
function preprocess() {
  return tf.tidy(() => {
    offCtx.drawImage(vid, 0, 0, inputSz, inputSz);
    return tf.browser.fromPixels(offscreen)
      .toFloat().div(255)
      .expandDims(0);
  });
}

// ── Run inference ──
async function detect() {
  let input, output;
  try {
    input  = preprocess();
    output = await model.executeAsync(input);
    const tensor = Array.isArray(output) ? output[0] : output;
    return decodeYOLOv8(tensor);
  } finally {
    if (input)  tf.dispose(input);
    if (output) tf.dispose(Array.isArray(output) ? output : [output]);
  }
}

// ── YOLOv8 decoder ──
function decodeYOLOv8(tensor) {
  const data = tensor.dataSync();
  const nc   = labels.length;
  const A    = tensor.shape[2];    // anchors — 2100 at 320, 8400 at 640
  const raw  = [];

  for (let i = 0; i < A; i++) {
    const cx = data[0*A+i], cy = data[1*A+i];
    const w  = data[2*A+i], h  = data[3*A+i];
    let maxConf = 0, cls = 0;
    for (let c = 0; c < nc; c++) {
      const s = data[(4+c)*A+i];
      if (s > maxConf) { maxConf = s; cls = c; }
    }
    if (maxConf < confThresh) continue;
    raw.push({
      x1: (cx-w/2)/inputSz*can.width,
      y1: (cy-h/2)/inputSz*can.height,
      x2: (cx+w/2)/inputSz*can.width,
      y2: (cy+h/2)/inputSz*can.height,
      conf: maxConf, cls
    });
  }
  return nms(raw);
}

// ── Per-class NMS (bug fix from previous version) ──
function nms(dets) {
  dets.sort((a,b) => b.conf - a.conf);
  const keep = [], dead = new Uint8Array(dets.length);
  for (let i = 0; i < dets.length; i++) {
    if (dead[i]) continue;
    keep.push(dets[i]);
    for (let j = i+1; j < dets.length; j++) {
      if (dead[j] || dets[i].cls !== dets[j].cls) continue;
      if (iou(dets[i], dets[j]) > IOU) dead[j] = 1;
    }
  }
  return keep;
}

function iou(a,b) {
  const ix1 = Math.max(a.x1,b.x1), iy1 = Math.max(a.y1,b.y1);
  const ix2 = Math.min(a.x2,b.x2), iy2 = Math.min(a.y2,b.y2);
  const inter = Math.max(0,ix2-ix1)*Math.max(0,iy2-iy1);
  const aA = (a.x2-a.x1)*(a.y2-a.y1), bA = (b.x2-b.x1)*(b.y2-b.y1);
  return inter/(aA+bA-inter+1e-6);
}

// ── Draw bounding boxes ──
function draw(dets) {
  ctx.clearRect(0, 0, can.width, can.height);
  const seen = {};
  for (const d of dets) {
    const lbl   = labels[d.cls] || `cls_${d.cls}`;
    const color = classColor(d.cls);
    const bw    = d.x2-d.x1, bh = d.y2-d.y1;

    ctx.strokeStyle = color;
    ctx.lineWidth   = 1.5;
    ctx.strokeRect(d.x1, d.y1, bw, bh);

    const txt = `${lbl} ${(d.conf*100).toFixed(0)}%`;
    ctx.font = 'bold 11px system-ui';
    const tw  = ctx.measureText(txt).width + 8;
    const ty  = d.y1 > 18 ? d.y1 - 18 : d.y1 + bh;

    ctx.fillStyle = color;
    ctx.fillRect(d.x1, ty, tw, 17);
    ctx.fillStyle = '#000';
    ctx.fillText(txt, d.x1+4, ty+12);

    seen[lbl] = (seen[lbl]||0)+1;
  }

  if (dets.length) {
    detEl.textContent = Object.entries(seen)
      .sort((a,b)=>b[1]-a[1])
      .map(([k,v])=>`${k}(${v})`).join(' · ');
  } else {
    detEl.textContent = '';
  }
}

// ── FPS counter ──
function updateFps() {
  framesSinceLastFps++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    fpsEl.textContent = `${framesSinceLastFps} fps`;
    framesSinceLastFps = 0;
    lastFpsTime = now;
  }
}

init();
</script>
</body>
</html>
