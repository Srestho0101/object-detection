<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DroneVision — Annotator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c12;
    --surface: #14141e;
    --surface2: #1e1e2d;
    --border: rgba(255,255,255,0.08);
    --accent: #7c6dfa;
    --accent-dim: rgba(124,109,250,0.15);
    --accent-border: rgba(124,109,250,0.4);
    --success: #4fffb0;
    --danger: #ff4f6b;
    --warn: #ffb74f;
    --text: #e4e4f0;
    --muted: #5a5a72;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; height: 100vh; }

  header {
    padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .logo { font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em; color: var(--accent); font-weight: 700; }
  .logo span { color: var(--muted); font-weight: 400; }

  .layout { display: flex; flex: 1; min-height: 0; }

  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .panel-title {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    padding: 12px 14px 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #file-list {
    flex: 1; overflow-y: auto;
    padding: 6px 0;
  }

  .file-item {
    padding: 7px 14px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .file-item:hover { background: var(--surface2); color: var(--text); }
  .file-item.active { background: var(--accent-dim); color: var(--accent); border-left: 2px solid var(--accent); padding-left: 12px; }

  .file-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  .file-item.annotated .file-dot { background: var(--success); }
  .file-item.active .file-dot { background: var(--accent); }

  .sidebar-footer {
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .canvas-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .tool-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.12s;
    letter-spacing: 0.04em;
  }
  .tool-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .tool-btn.active { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
  .tool-btn.danger { border-color: rgba(255,79,107,0.3); color: var(--danger); }
  .tool-btn.danger:hover { background: rgba(255,79,107,0.1); }
  .tool-btn.success { border-color: rgba(79,255,176,0.3); color: var(--success); }
  .tool-btn.success:hover { background: rgba(79,255,176,0.1); }

  #label-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 8px;
    border-radius: 5px;
    outline: none;
    cursor: pointer;
  }

  #new-label-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 8px;
    border-radius: 5px;
    outline: none;
    width: 100px;
    transition: border-color 0.2s;
  }
  #new-label-input:focus { border-color: var(--accent-border); }
  #new-label-input::placeholder { color: var(--muted); }

  .canvas-container {
    flex: 1;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: #07070d;
  }

  #canvas {
    display: block;
    cursor: crosshair;
    image-rendering: pixelated;
    max-width: 100%;
    max-height: 100%;
  }

  .drop-zone {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
    text-align: center;
    padding: 20px;
  }

  .drop-icon {
    width: 48px; height: 48px;
    border: 2px dashed var(--muted);
    border-radius: 12px;
    opacity: 0.4;
    display: flex; align-items: center; justify-content: center;
  }

  .box-panel {
    width: 200px;
    flex-shrink: 0;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #box-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }

  .box-item {
    padding: 7px 12px;
    font-family: var(--mono);
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    cursor: pointer;
    transition: background 0.1s;
  }

  .box-item:hover { background: var(--surface2); }
  .box-item.selected { background: var(--accent-dim); }

  .box-color {
    width: 8px; height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .box-label { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .box-coords { color: var(--muted); font-size: 9px; }

  .del-box-btn {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 14px; padding: 0 2px;
    line-height: 1;
    transition: color 0.1s;
  }
  .del-box-btn:hover { color: var(--danger); }

  .status-bar {
    padding: 6px 14px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .status-bar span { color: var(--text); }

  .btn-full {
    display: block;
    width: 100%;
    padding: 9px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    border-radius: 6px;
    letter-spacing: 0.05em;
    transition: all 0.15s;
    text-align: center;
  }

  .btn-primary { background: var(--accent-dim); border: 1px solid var(--accent-border); color: var(--accent); }
  .btn-primary:hover { background: rgba(124,109,250,0.25); }
  .btn-secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }
  .btn-secondary:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .btn-export { background: rgba(79,255,176,0.1); border: 1px solid rgba(79,255,176,0.3); color: var(--success); }
  .btn-export:hover { background: rgba(79,255,176,0.2); }

  #toast {
    position: absolute;
    bottom: 48px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: var(--surface2);
    border: 1px solid var(--accent-border);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 11px;
    padding: 8px 18px;
    border-radius: 99px;
    pointer-events: none;
    opacity: 0;
    transition: all 0.2s;
    white-space: nowrap;
    z-index: 100;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

  #upload-btn-hidden { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo">DRONE<span>VISION</span> <span style="color:#222">//</span> ANNOTATOR</div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="tool-btn" onclick="document.getElementById('upload-btn-hidden').click()">[ LOAD ZIP ]</button>
    <input type="file" id="upload-btn-hidden" accept=".zip,image/*" multiple onchange="handleFileInput(this.files)">
    <span id="progress-text" style="font-family:var(--mono);font-size:11px;color:var(--muted)">0/0 annotated</span>
  </div>
</header>

<div class="layout">

  <!-- Left sidebar: image list -->
  <div class="sidebar">
    <div class="panel-title">// IMAGES</div>
    <div id="file-list">
      <div style="padding:20px 14px;font-family:var(--mono);font-size:11px;color:var(--muted);line-height:1.7">
        Load a ZIP from the capture app, or drag images here.
      </div>
    </div>
    <div class="sidebar-footer" style="display:flex;flex-direction:column;gap:6px">
      <button class="btn-full btn-secondary" onclick="prevImage()">&#8593; prev  [A]</button>
      <button class="btn-full btn-secondary" onclick="nextImage()">&#8595; next  [D]</button>
    </div>
  </div>

  <!-- Main canvas -->
  <div class="canvas-area">
    <div class="toolbar">
      <span style="font-family:var(--mono);font-size:11px;color:var(--muted)">label:</span>
      <select id="label-select" onchange="currentLabel=this.value"></select>
      <input id="new-label-input" type="text" placeholder="new label..." onkeydown="addLabelKey(event)">
      <button class="tool-btn" onclick="addLabelFromInput()">+ add</button>
      <div style="flex:1"></div>
      <button class="tool-btn danger" onclick="clearBoxes()">clear frame</button>
      <button class="tool-btn success" onclick="saveAndNext()">save + next [space]</button>
    </div>

    <div class="canvas-container" id="canvas-container"
         ondragover="event.preventDefault()" ondrop="handleDrop(event)">
      <canvas id="canvas"></canvas>
      <div class="drop-zone" id="drop-zone">
        <div class="drop-icon">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 4v12M8 8l4-4 4 4"/>
          </svg>
        </div>
        drag images or a ZIP here<br>
        <span style="font-size:10px;color:var(--muted)">or use [ LOAD ZIP ] button above</span>
      </div>
    </div>

    <div class="status-bar">
      <div>image: <span id="st-file">—</span></div>
      <div>boxes: <span id="st-boxes">0</span></div>
      <div>cursor: <span id="st-cursor">—</span></div>
      <div>size: <span id="st-size">—</span></div>
    </div>
  </div>

  <!-- Right panel: boxes for this image -->
  <div class="box-panel">
    <div class="panel-title">// ANNOTATIONS</div>
    <div id="box-list"></div>
    <div class="sidebar-footer" style="display:flex;flex-direction:column;gap:6px">
      <button class="btn-full btn-export" onclick="exportYOLO()">[ EXPORT YOLO ]</button>
      <button class="btn-full btn-secondary" style="font-size:10px" onclick="showHelp()">what is YOLO format?</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('canvas-container');
const dropZone = document.getElementById('drop-zone');

let images = [];       // {name, label, dataUrl, img, naturalW, naturalH}
let annotations = {};  // {filename: [{label, x1,y1,x2,y2 in image coords}]}
let currentIdx = -1;
let currentLabel = 'person';
let labels = ['person','car','tree','building','road','drone'];
let drawing = false;
let startX, startY, endX, endY;
let scale = 1;
let offsetX = 0, offsetY = 0;
let selectedBox = -1;

const COLORS = ['#7c6dfa','#4fffb0','#ffb74f','#ff4f6b','#4fc3ff','#ff9f4f','#c8fa4f','#fa4fff'];
const labelColor = {};

function getColor(label) {
  if (!labelColor[label]) {
    labelColor[label] = COLORS[Object.keys(labelColor).length % COLORS.length];
  }
  return labelColor[label];
}

function populateLabelSelect() {
  const sel = document.getElementById('label-select');
  sel.innerHTML = labels.map(l => `<option value="${l}">${l}</option>`).join('');
  sel.value = currentLabel;
}

async function handleFileInput(files) {
  const arr = Array.from(files);
  for (const f of arr) {
    if (f.name.endsWith('.zip')) {
      await loadZip(f);
    } else if (f.type.startsWith('image/')) {
      await addImageFile(f);
    }
  }
  renderFileList();
  if (currentIdx === -1 && images.length > 0) loadImage(0);
}

async function loadZip(file) {
  const zip = await JSZip.loadAsync(file);
  const imageFiles = [];
  zip.forEach((path, entry) => {
    if (!entry.dir && /\.(jpe?g|png|webp)$/i.test(path)) {
      imageFiles.push({ path, entry });
    }
  });
  imageFiles.sort((a, b) => a.path.localeCompare(b.path));
  for (const { path, entry } of imageFiles) {
    const blob = await entry.async('blob');
    const label = path.split('/')[0] || 'unknown';
    if (!labels.includes(label)) { labels.push(label); populateLabelSelect(); }
    await addImageBlob(blob, path.split('/').pop(), label);
  }
  showToast(`Loaded ${imageFiles.length} images`);
}

async function addImageFile(file) {
  const url = URL.createObjectURL(file);
  const label = file.name.split('_')[0] || 'unknown';
  if (!labels.includes(label)) { labels.push(label); populateLabelSelect(); }
  await addImageBlob(file, file.name, label);
}

async function addImageBlob(blob, name, label) {
  const url = URL.createObjectURL(blob);
  const img = await loadHTMLImage(url);
  images.push({ name, label, dataUrl: url, img, naturalW: img.naturalWidth, naturalH: img.naturalHeight });
  if (!annotations[name]) annotations[name] = [];
}

function loadHTMLImage(src) {
  return new Promise(res => {
    const i = new Image(); i.onload = () => res(i); i.src = src;
  });
}

function handleDrop(e) {
  e.preventDefault();
  handleFileInput(e.dataTransfer.files);
}

function renderFileList() {
  const el = document.getElementById('file-list');
  el.innerHTML = images.map((img, i) => {
    const hasAnno = (annotations[img.name] || []).length > 0;
    return `<div class="file-item ${hasAnno?'annotated':''} ${i===currentIdx?'active':''}" onclick="loadImage(${i})">
      <div class="file-dot"></div>
      <span>${img.name}</span>
    </div>`;
  }).join('');
  const total = images.length;
  const done = images.filter(img => (annotations[img.name]||[]).length > 0).length;
  document.getElementById('progress-text').textContent = `${done}/${total} annotated`;
}

function loadImage(idx) {
  currentIdx = idx;
  renderFileList();
  renderCanvas();
  renderBoxList();
  const img = images[idx];
  document.getElementById('st-file').textContent = img.name;
  document.getElementById('st-size').textContent = img.naturalW + 'x' + img.naturalH;
  document.getElementById('st-boxes').textContent = (annotations[img.name]||[]).length;
  if (dropZone) dropZone.style.display = 'none';
}

function getScaleOffset() {
  if (currentIdx < 0) return;
  const img = images[currentIdx];
  const cw = container.clientWidth;
  const ch = container.clientHeight;
  scale = Math.min(cw / img.naturalW, ch / img.naturalH);
  const dispW = img.naturalW * scale;
  const dispH = img.naturalH * scale;
  offsetX = (cw - dispW) / 2;
  offsetY = (ch - dispH) / 2;
  canvas.width = cw;
  canvas.height = ch;
}

function renderCanvas() {
  if (currentIdx < 0) return;
  getScaleOffset();
  const img = images[currentIdx];
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img.img, offsetX, offsetY, img.naturalW * scale, img.naturalH * scale);
  const boxes = annotations[img.name] || [];
  boxes.forEach((b, i) => {
    const cx1 = offsetX + b.x1 * scale;
    const cy1 = offsetY + b.y1 * scale;
    const cx2 = offsetX + b.x2 * scale;
    const cy2 = offsetY + b.y2 * scale;
    const color = getColor(b.label);
    ctx.strokeStyle = i === selectedBox ? '#fff' : color;
    ctx.lineWidth = i === selectedBox ? 2.5 : 1.5;
    ctx.strokeRect(cx1, cy1, cx2 - cx1, cy2 - cy1);
    ctx.fillStyle = color + '33';
    ctx.fillRect(cx1, cy1, cx2 - cx1, cy2 - cy1);
    ctx.fillStyle = color;
    ctx.font = 'bold 11px Space Mono, monospace';
    const tw = ctx.measureText(b.label).width;
    ctx.fillRect(cx1, cy1 - 18, tw + 8, 18);
    ctx.fillStyle = '#000';
    ctx.fillText(b.label, cx1 + 4, cy1 - 5);
  });
  if (drawing) {
    const color = getColor(currentLabel);
    const x = Math.min(startX, endX), y = Math.min(startY, endY);
    const w = Math.abs(endX - startX), h = Math.abs(endY - startY);
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 3]);
    ctx.strokeRect(x, y, w, h);
    ctx.setLineDash([]);
    ctx.fillStyle = color + '22';
    ctx.fillRect(x, y, w, h);
  }
}

function canvasToImage(cx, cy) {
  const img = images[currentIdx];
  return { x: (cx - offsetX) / scale, y: (cy - offsetY) / scale };
}

function clampImg(v, max) { return Math.max(0, Math.min(max, v)); }

canvas.addEventListener('mousedown', e => {
  if (currentIdx < 0) return;
  const r = canvas.getBoundingClientRect();
  startX = e.clientX - r.left; startY = e.clientY - r.top;
  endX = startX; endY = startY;
  drawing = true;
});

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const cx = e.clientX - r.left;
  const cy = e.clientY - r.top;
  if (currentIdx >= 0) {
    const ip = canvasToImage(cx, cy);
    document.getElementById('st-cursor').textContent = `${Math.round(ip.x)}, ${Math.round(ip.y)}`;
  }
  if (!drawing) return;
  endX = cx; endY = cy;
  renderCanvas();
});

canvas.addEventListener('mouseup', e => {
  if (!drawing || currentIdx < 0) return;
  drawing = false;
  const r = canvas.getBoundingClientRect();
  endX = e.clientX - r.left; endY = e.clientY - r.top;
  const img = images[currentIdx];
  const p1 = canvasToImage(startX, startY);
  const p2 = canvasToImage(endX, endY);
  const x1 = clampImg(Math.min(p1.x, p2.x), img.naturalW);
  const y1 = clampImg(Math.min(p1.y, p2.y), img.naturalH);
  const x2 = clampImg(Math.max(p1.x, p2.x), img.naturalW);
  const y2 = clampImg(Math.max(p1.y, p2.y), img.naturalH);
  if ((x2 - x1) > 5 && (y2 - y1) > 5) {
    if (!annotations[img.name]) annotations[img.name] = [];
    annotations[img.name].push({ label: currentLabel, x1, y1, x2, y2 });
    renderBoxList();
    document.getElementById('st-boxes').textContent = annotations[img.name].length;
  }
  renderCanvas();
});

// Touch support for phone/tablet
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const ev = new MouseEvent('mousedown', { clientX: t.clientX, clientY: t.clientY });
  canvas.dispatchEvent(ev);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  const ev = new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY });
  canvas.dispatchEvent(ev);
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const ev = new MouseEvent('mouseup', { clientX: t.clientX, clientY: t.clientY });
  canvas.dispatchEvent(ev);
}, { passive: false });

function renderBoxList() {
  const el = document.getElementById('box-list');
  if (currentIdx < 0) { el.innerHTML = ''; return; }
  const img = images[currentIdx];
  const boxes = annotations[img.name] || [];
  el.innerHTML = boxes.map((b, i) => `
    <div class="box-item ${i===selectedBox?'selected':''}" onclick="selectBox(${i})">
      <div class="box-color" style="background:${getColor(b.label)}"></div>
      <span class="box-label">${b.label}</span>
      <span class="box-coords">${Math.round(b.x2-b.x1)}x${Math.round(b.y2-b.y1)}</span>
      <button class="del-box-btn" onclick="deleteBox(event,${i})">×</button>
    </div>
  `).join('') || '<div style="padding:14px;font-family:var(--mono);font-size:11px;color:var(--muted)">No boxes yet.<br>Draw on image.</div>';
}

function selectBox(i) {
  selectedBox = i === selectedBox ? -1 : i;
  renderBoxList();
  renderCanvas();
}

function deleteBox(e, i) {
  e.stopPropagation();
  const img = images[currentIdx];
  annotations[img.name].splice(i, 1);
  if (selectedBox === i) selectedBox = -1;
  renderBoxList();
  renderCanvas();
  document.getElementById('st-boxes').textContent = annotations[img.name].length;
}

function clearBoxes() {
  if (currentIdx < 0) return;
  annotations[images[currentIdx].name] = [];
  selectedBox = -1;
  renderBoxList();
  renderCanvas();
  document.getElementById('st-boxes').textContent = '0';
}

function saveAndNext() {
  renderFileList();
  nextImage();
}

function nextImage() {
  if (images.length === 0) return;
  loadImage((currentIdx + 1) % images.length);
}

function prevImage() {
  if (images.length === 0) return;
  loadImage((currentIdx - 1 + images.length) % images.length);
}

function addLabelKey(e) {
  if (e.key === 'Enter') addLabelFromInput();
}

function addLabelFromInput() {
  const inp = document.getElementById('new-label-input');
  const val = inp.value.trim().toLowerCase().replace(/\s+/g,'_');
  if (!val) return;
  if (!labels.includes(val)) { labels.push(val); populateLabelSelect(); }
  currentLabel = val;
  document.getElementById('label-select').value = val;
  inp.value = '';
  showToast('Label added: ' + val);
}

async function exportYOLO() {
  if (images.length === 0) { showToast('No images loaded'); return; }
  const zip = new JSZip();
  const imgFolder = zip.folder('images');
  const lblFolder = zip.folder('labels');
  let count = 0;

  for (const img of images) {
    const boxes = annotations[img.name] || [];
    if (boxes.length === 0) continue;
    const b64 = img.dataUrl.split(',')[1];
    if (b64) imgFolder.file(img.name, b64, { base64: true });
    const yoloLines = boxes.map(b => {
      const cx = ((b.x1 + b.x2) / 2) / img.naturalW;
      const cy = ((b.y1 + b.y2) / 2) / img.naturalH;
      const bw = (b.x2 - b.x1) / img.naturalW;
      const bh = (b.y2 - b.y1) / img.naturalH;
      const classId = labels.indexOf(b.label);
      return `${classId} ${cx.toFixed(6)} ${cy.toFixed(6)} ${bw.toFixed(6)} ${bh.toFixed(6)}`;
    });
    const txtName = img.name.replace(/\.(jpe?g|png|webp)$/i, '.txt');
    lblFolder.file(txtName, yoloLines.join('\n'));
    count++;
  }

  const classesYaml = `# YOLOv8 dataset config
path: ./dataset
train: images
val: images

nc: ${labels.length}
names: [${labels.map(l=>`'${l}'`).join(', ')}]
`;
  zip.file('data.yaml', classesYaml);

  const readme = `# DroneVision YOLO Dataset

Annotated: ${new Date().toLocaleDateString()}
Annotated images: ${count}
Classes (${labels.length}): ${labels.join(', ')}

## Format
Each label file contains one row per bounding box:
  class_id  cx  cy  width  height
All values normalized 0-1 relative to image dimensions.

## Usage
Upload to Roboflow for train/val split and augmentation,
or use directly with YOLOv8/ultralytics:

  from ultralytics import YOLO
  model = YOLO('yolov8n.pt')
  model.train(data='data.yaml', epochs=50)
`;
  zip.file('README.md', readme);

  const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `dronevision_yolo_${Date.now()}.zip`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`Exported ${count} annotated images`);
}

function showHelp() {
  if (typeof sendPrompt === 'function') {
    sendPrompt('Explain YOLO label format — what does "class_id cx cy width height" mean and why is it normalized?');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') { e.preventDefault(); saveAndNext(); }
  if (e.code === 'KeyA') prevImage();
  if (e.code === 'KeyD') nextImage();
  if (e.code === 'KeyZ' && (e.ctrlKey || e.metaKey)) {
    if (currentIdx >= 0) {
      const img = images[currentIdx];
      if ((annotations[img.name]||[]).length > 0) {
        annotations[img.name].pop();
        renderBoxList(); renderCanvas();
        document.getElementById('st-boxes').textContent = annotations[img.name].length;
      }
    }
  }
  if (e.code === 'Delete' || e.code === 'Backspace') {
    if (selectedBox >= 0 && currentIdx >= 0) {
      const img = images[currentIdx];
      annotations[img.name].splice(selectedBox, 1);
      selectedBox = -1;
      renderBoxList(); renderCanvas();
    }
  }
});

window.addEventListener('resize', () => { if (currentIdx >= 0) renderCanvas(); });
populateLabelSelect();
</script>
